<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather API App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="weather-card">
    <h1>Weather App</h1>
    <p>Enter a city name to fetch live weather data asynchronously.</p>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Example: Delhi">
      <button id="searchBtn">Get Weather</button>
    </div>

    <section id="weatherResult"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
