<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ES6 Student Grade App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>ES6 Student Grade Application</h1>
    <p>This app uses ES6 features: let, const, arrow functions, template literals, destructuring, spread operator, classes, and array methods.</p>

    <form id="studentForm">
      <input type="text" id="name" placeholder="Student Name" required>
      <input type="number" id="marks" placeholder="Marks out of 100" required min="0" max="100">
      <button type="submit">Add Student</button>
    </form>

    <section>
      <h2>Student Result</h2>
      <div id="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
