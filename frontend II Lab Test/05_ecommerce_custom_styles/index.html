<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custom Styled E-Commerce Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">StyleMart</a>
      <button class="btn cart-btn">Cart 🛒</button>
    </div>
  </nav>

  <section class="hero">
    <div class="container text-center">
      <h1>Modern Shopping Experience</h1>
      <p>Premium products with stylish design and easy shopping.</p>
      <button class="btn hero-btn">Shop Now</button>
    </div>
  </section>

  <main class="container my-5">
    <h2 class="section-title">Featured Products</h2>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card product-card">
          <img src="https://picsum.photos/seed/shoes/500/320" class="card-img-top" alt="Shoes">
          <div class="card-body">
            <h5>Sneakers</h5>
            <p>Comfortable daily wear shoes.</p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="price">₹2,999</span>
              <button class="btn buy-btn">Buy</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card product-card">
          <img src="https://picsum.photos/seed/bag/500/320" class="card-img-top" alt="Bag">
          <div class="card-body">
            <h5>Travel Bag</h5>
            <p>Durable and stylish travel bag.</p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="price">₹1,799</span>
              <button class="btn buy-btn">Buy</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card product-card">
          <img src="https://picsum.photos/seed/watchstyle/500/320" class="card-img-top" alt="Watch">
          <div class="card-body">
            <h5>Classic Watch</h5>
            <p>Premium watch for formal looks.</p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="price">₹3,499</span>
              <button class="btn buy-btn">Buy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
