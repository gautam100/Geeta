<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Bootstrap 5</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-lg-4 col-sm-12 col-md-4 border border-primary"> 
                    small Device(sm): Mobile
                    medium Device(md): Tablet
                    Large Device(lg): Laptop, Dektop
                    Extra Large(xl): TV
                    Extra Extra Large (xxl): TV
                </div>
                <div class="col-lg-6 col-sm-12 col-md-4  border border-success"> 
                    <h1>Column 2</h1>
                </div>
                <div class="col-lg-2 col-sm-12 col-md-4  border border-danger"> 
                    <h1>Column 3 </h1>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <div class="alert alert-primary">Your form submitted successfully!</div>
                    <div class="alert alert-secondary">Your form submitted successfully!</div>
                    <div class="alert alert-success">Your form submitted successfully!</div>
                    <div class="alert alert-danger">There is some error!</div>
                    <div class="alert alert-warning">There is some error!</div>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <button class="btn btn-primary">Click Me!</button>
                    <button class="btn btn-secondary">Click Me!</button>
                    <button class="btn btn-danger">Click Me!</button>
                    <button class="btn btn-warning">Click Me!</button>
                    <button class="btn btn-outline-primary">Submit</button>
                    <button class="btn btn-outline-info">Submit</button>
                    <button class="btn btn-outline-warning">Submit</button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
