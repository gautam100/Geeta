<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>
    <body onload="x()">
        <button onclick="arrowFunc()">Arrow function</button>
        <script>
            let x = function(){
                console.log("This is a anonymous function")
            }
            let arrowFunc = () => {
                console.log("This is a arrow function")
            }
        </script>
    </body>
</html>
