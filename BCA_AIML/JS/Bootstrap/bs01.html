<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Bootstrap 5</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row border border-primary m-4 p-4">
        <div class="col-lg-4 col-sm-1">
          <button type="button" class="btn btn-primary position-relative">
            Inbox
            <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            >
              99+
              <span class="visually-hidden">unread messages</span>
            </span>
          </button>
        </div>
        <div class="col-lg-5 col-sm-1">Column 2</div>
        <div class="col-lg-3 col-sm-10">Column 3</div>
      </div>
      <div class="row border border-danger m-4 p-4">
        <div class="col-lg-4 col-sm-1 border border-danger">
          <button class="btn btn-primary">Click Me!</button>
        </div>
        <div class="col-lg-5 col-sm-1 border border-danger">
          <button class="btn btn-danger">Click Me!</button>
        </div>
        <div class="col-lg-3 col-sm-10 border border-danger">
          <button class="btn btn-success">Click Me!</button>
        </div>
      </div>
      <div>
        <div class="col-lg-12">
          <div class="alert alert-primary">Form submitted successfully!</div>
          <div class="alert alert-secondary">Form submitted successfully!</div>
          <div class="alert alert-success">Form submitted successfully!</div>
          <div class="alert alert-danger">Form submitted successfully!</div>
          <div class="alert alert-info">Form submitted successfully!</div>
          <div class="alert alert-warning">Form submitted successfully!</div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
